<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관악구 공시가격 적정성 진단 플랫폼</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; }
  body { font-family: 'Noto Sans KR', sans-serif; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 60px; background: #1a2744;
    display: flex; align-items: center; gap: 16px; padding: 0 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #topbar h1 { color: #fff; font-size: 15px; font-weight: 700; white-space: nowrap; }
  #search-wrap { flex: 1; max-width: 480px; display: flex; gap: 8px; }
  #search-input {
    flex: 1; padding: 8px 14px; border: none;
    border-radius: 6px; font-size: 14px; outline: none;
  }
  #search-btn {
    padding: 8px 18px; background: #2980b9; color: #fff;
    border: none; border-radius: 6px; font-size: 14px;
    cursor: pointer; white-space: nowrap;
  }
  #search-btn:hover { background: #1f6391; }

  #map {
    position: fixed; top: 60px; left: 0; right: 0; bottom: 0;
    width: 100%; height: calc(100vh - 60px);
  }

  #search-results {
    position: fixed; top: 60px; left: 20px;
    width: 360px; max-height: 400px;
    background: #fff; border-radius: 0 0 8px 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    overflow-y: auto; z-index: 200; display: none;
  }
  .result-item {
    padding: 12px 16px; border-bottom: 1px solid #eee;
    cursor: pointer; transition: background 0.15s;
  }
  .result-item:hover { background: #f0f4f8; }
  .result-item .name { font-weight: 700; font-size: 14px; color: #1a2744; }
  .result-item .sub  { font-size: 12px; color: #888; margin-top: 2px; }
  .result-empty { padding: 16px; text-align: center; color: #aaa; font-size: 14px; }

  #detail-panel {
    position: fixed; top: 60px; right: 0;
    width: 340px; height: calc(100vh - 60px);
    background: #fff; box-shadow: -4px 0 16px rgba(0,0,0,0.12);
    z-index: 150; display: none; flex-direction: column; overflow: hidden;
  }
  #detail-panel.open { display: flex; }

  #panel-header {
    background: #1a2744; color: #fff; padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-shrink: 0;
  }
  #panel-header .title { font-size: 16px; font-weight: 700; }
  #panel-header .sub   { font-size: 12px; color: #aac4e0; margin-top: 4px; }
  #panel-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }

  #panel-body { flex: 1; overflow-y: auto; padding: 16px; }

  /* 등급 배지 */
  .grade-badge {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 8px;
    font-size: 14px; font-weight: 700; margin-bottom: 4px;
  }
  .grade-심각과대 { background: #fde8e8; color: #a82b2b; border: 1.5px solid #e8a0a0; }
  .grade-과대     { background: #fff3cd; color: #856404; border: 1.5px solid #ffc940; }
  .grade-적정     { background: #d4edda; color: #155724; border: 1.5px solid #7ecf95; }
  .grade-과소     { background: #e8f4fd; color: #1a6fa8; border: 1.5px solid #7bbde0; }
  .grade-심각과소 { background: #ede8fd; color: #4a2b8a; border: 1.5px solid #a08de0; }

  .fair-price-note {
    font-size: 11px; color: #999; text-align: right; margin-bottom: 14px;
  }

  .section-title {
    font-size: 11px; font-weight: 700; color: #999;
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 14px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #eee;
  }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0; font-size: 13px; border-bottom: 1px solid #f5f5f5;
  }
  .info-row .label { color: #666; }
  .info-row .value { font-weight: 600; color: #1a2744; }
  .info-row .value.big { font-size: 15px; color: #1a2744; }
  .src-note { font-size: 11px; color: #bbb; margin-top: 2px; text-align: right; }

  /* 전세대출 박스 */
  .loan-box {
    margin-top: 12px; padding: 12px 14px;
    border-radius: 8px; font-size: 13px;
  }
  .loan-ok   { background: #d4edda; color: #155724; border: 1px solid #7ecf95; }
  .loan-ng   { background: #fde8e8; color: #a82b2b; border: 1px solid #e8a0a0; }
  .loan-note { font-size: 10px; color: #999; margin-top: 6px; line-height: 1.5; }

  #loading {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: rgba(26,39,68,0.85); color: #fff;
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; z-index: 300; display: none;
  }
</style>
</head>

let map, currentMarkers = [];

function initKakaoMap() {
  const script = document.createElement('script');
  script.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=1b628366d60992b259547aba2cc2ec88&autoload=false&libraries=services';
  script.onload = function() { kakao.maps.load(initMap); };
  document.head.appendChild(script);
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.4784, 126.9516),
    level: 5
  });

  function clearMarkers() {
    currentMarkers.forEach(m => m.setMap(null));
    currentMarkers = [];
  }

  function addMarker(item) {
    const pos = new kakao.maps.LatLng(item.lat, item.lon);
    const el  = document.createElement('div');
    el.style.cssText = `
      background:#1a2744; color:#fff;
      padding:4px 10px; border-radius:12px;
      font-size:12px; font-weight:700;
      white-space:nowrap; cursor:pointer;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    `;
    el.textContent = item.apt_name || '—';
    el.onclick = () => showPanel(item);
    const marker = new kakao.maps.CustomOverlay({ position: pos, content: el, yAnchor: 1.2 });
    marker.setMap(map);
    currentMarkers.push(marker);
  }

  function showPanel(item) {
    document.getElementById('panel-title').textContent = item.apt_name || '—';
    document.getElementById('panel-sub').textContent =
      `${item.dong||''} · ${item.purpose||''} · ${floorText(item.floor)} · ${item.priv_area}㎡`;

    // 등급 표시
    const gradeLabel = {
      '심각과대': '⬆ 심각과대',
      '과대':     '↑ 과대',
      '적정':     '✓ 적정',
      '과소':     '↓ 과소',
      '심각과소': '⬇ 심각과소',
    };
    const grade = item.equity_grade || '—';
    const gradeText = gradeLabel[grade] || grade;
    const gradeCls  = `grade-${grade}`;

    const fmt = (v) => {
      if (!v && v !== 0) return '—';
      const n = Math.round(Number(v));
      const uk = Math.floor(n / 10000);
      const man = n % 10000;
      if (uk > 0 && man > 0) return `${uk}억 ${man.toLocaleString()}만원`;
      if (uk > 0)            return `${uk}억원`;
      return `${man.toLocaleString()}만원`;
    };
    const pct = (v) => v ? (v * 100).toFixed(1) + '%' : '—';

    // 공시가격 구간별 현실화율 표시
    const tierPct = item.tier_ratio ? (item.tier_ratio * 100).toFixed(1) + '%' : '—';

    // 전세대출 박스 (전세가 역산인 경우만)
    let loanHtml = '';
    if (item.price_source === '전세가 역산' && item.over_126 !== null && item.over_126 !== undefined) {
      if (item.over_126 === true) {
        loanHtml = `
          <div class="loan-box loan-ng">
            ⚠ 전세대출 불가 가능성<br>
            <span style="font-size:12px;">전세보증금이 공시가격의 126%를 초과합니다.</span>
            <div class="loan-note">단, 해당 내용은 126%룰을 만족한다는 의미로써 실제 전세 대출 실행을 보장하는 내용이 아님을 알려드립니다.</div>
          </div>`;
      } else {
        loanHtml = `
          <div class="loan-box loan-ok">
            ✓ 전세대출 가능<br>
            <span style="font-size:12px;">전세보증금이 공시가격의 126% 이하입니다.</span>
            <div class="loan-note">단, 해당 내용은 126%룰을 만족한다는 의미로써 실제 전세 대출 실행을 보장하는 내용이 아님을 알려드립니다.</div>
          </div>`;
      }
    }

    // 최근 매매가 출처 표기
    const srcNote = item.price_source === '전세가 역산'
      ? `<div class="src-note">※ 전세보증금을 전세가율로 역산한 추정가</div>` : '';

    document.getElementById('panel-body').innerHTML = `

      <div class="section-title">공시가격</div>
      <div class="info-row">
        <span class="label">공시가격</span>
        <span class="value big">${fmt(item.notice_amt)}</span>
      </div>

      <div class="section-title">최근 매매가</div>
      <div class="info-row">
        <span class="label">매매가 (중앙값)</span>
        <span class="value big">${fmt(item.median_price ? Math.round(item.median_price) : null)}</span>
      </div>
      ${srcNote}

      <div class="section-title">현실화율</div>
      <div class="info-row">
        <span class="label">실제 현실화율</span>
        <span class="value">${pct(item.actual_ratio)}</span>
      </div>
      <div class="info-row">
        <span class="label">구간별 기준 현실화율</span>
        <span class="value">${tierPct}</span>
      </div>

      <div class="section-title">공시가격 형평성</div>
      <div class="grade-badge ${gradeCls}">
        <span>${gradeText}</span>
        <span style="font-size:13px;">비율 ${item.equity_ratio ? (item.equity_ratio).toFixed(3) : '—'}</span>
      </div>
      <div class="fair-price-note">적정 공시가격: ${fmt(item.fair_price ? Math.round(item.fair_price) : null)}</div>

      ${loanHtml}
    `;

    document.getElementById('detail-panel').classList.add('open');
    map.panTo(new kakao.maps.LatLng(item.lat, item.lon));
  }

  document.getElementById('panel-close').onclick = () =>
    document.getElementById('detail-panel').classList.remove('open');

  async function doSearch(q) {
    if (!q.trim()) return;
    setLoading(true);
    try {
      const res  = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderResults(data.items);
    } finally { setLoading(false); }
  }

  function renderResults(items) {
    const box = document.getElementById('search-results');
    if (!items || items.length === 0) {
      box.innerHTML = '<div class="result-empty">검색 결과가 없습니다.</div>';
      box.style.display = 'block'; return;
    }
    box.innerHTML = items.map(item => `
      <div class="result-item" data-rid="${item.rid}">
        <div class="name">${item.apt_name||'—'}</div>
        <div class="sub">${item.road_name||''} · ${item.purpose||''} · ${floorText(item.floor)} · ${item.priv_area}㎡</div>
      </div>
    `).join('');
    box.style.display = 'block';
    box.querySelectorAll('.result-item').forEach(el => {
      el.onclick = () => {
        const item = items.find(i => String(i.rid) === el.dataset.rid);
        if (!item) return;
        clearMarkers(); addMarker(item); showPanel(item);
        map.setLevel(3); box.style.display = 'none';
      };
    });
  }

  document.getElementById('search-btn').onclick = () =>
    doSearch(document.getElementById('search-input').value);
  document.getElementById('search-input').onkeydown = e => {
    if (e.key === 'Enter') doSearch(e.target.value);
  };
  document.getElementById('search-input').oninput = e => {
    if (!e.target.value.trim())
      document.getElementById('search-results').style.display = 'none';
  };
  document.getElementById('map').addEventListener('click', () =>
    document.getElementById('search-results').style.display = 'none');

  kakao.maps.event.addListener(map, 'click', async (mouseEvent) => {
    const lat = mouseEvent.latLng.getLat();
    const lon = mouseEvent.latLng.getLng();
    setLoading(true);
    try {
      const res  = await fetch(`${API}/nearby?lat=${lat}&lon=${lon}&radius=0.2`);
      const data = await res.json();
      if (!data.items || data.items.length === 0) return;
      clearMarkers();
      data.items.forEach(item => addMarker(item));
      showPanel(data.items[0]);
      map.setLevel(4);
    } finally { setLoading(false); }
  });
}

function resetHome() {
  // 마커 제거
  currentMarkers.forEach(m => m.setMap(null));
  currentMarkers = [];
  // 패널 닫기
  document.getElementById('detail-panel').classList.remove('open');
  // 검색창 초기화
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').style.display = 'none';
  // 지도 초기 위치로
  if (map) {
    map.setCenter(new kakao.maps.LatLng(37.4784, 126.9516));
    map.setLevel(5);
  }
}

function floorText(f) {
  if (f === null || f === undefined) return '—';
  if (f < 0) return `반지하(${Math.abs(f)}층)`;
  return `${f}층`;
}

window.onload = initKakaoMap;

function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
}
</script>
</body>
</html>
